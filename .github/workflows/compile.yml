name: compile

on:
  push:
    paths: ["esphome/**"]
  pull_request:
    paths: ["esphome/**"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        yaml:
          - esphome/hello.yaml
          # add more faces here:
          # - esphome/brewing.yaml
          # - esphome/pet.yaml
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.yaml }}
        uses: esphome/build-action@v7
        id: build
        with:
          yaml-file: ${{ matrix.yaml }}
          complete-manifest: true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ hashFiles(matrix.yaml) }}
          path: ${{ steps.build.outputs.name }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: docs/firmware

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
