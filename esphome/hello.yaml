substitutions:
  name: jc3248-hello
  friendly_name: JC3248 Hello

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

ota:
  - platform: esphome

# ── Improv WiFi: config via browser (no hardcoded credentials!) ──
wifi:
  ap:
    ssid: "${name}-setup"

captive_portal:

# Serial Improv: connect USB → open https://www.improv-wifi.com/ → set WiFi
improv_serial:

# BLE Improv: open phone/browser → scan BLE → set WiFi (no cable needed)
esp32_improv:
  authorizer: none

web_server:
  port: 80
  version: 3

# ── QSPI display ──
spi:
  - id: lcd_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

output:
  - platform: ledc
    pin: 1
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    id: backlight
    name: Backlight
    output: backlight_pwm
    restore_mode: ALWAYS_ON

# ── ψ image (downloaded at compile time, embedded in firmware) ──
image:
  - id: psi_logo
    file: https://antigravity.laris.workers.dev/images/035-psi-writing-prong.png
    resize: 240x240
    type: RGB565

display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: 45
    dimensions: { width: 320, height: 480 }
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: 30s
    auto_clear_enabled: true
    lambda: |-
      // dark background
      it.filled_rectangle(0, 0, 320, 480, Color(0x0C, 0x0A, 0x07));
      // ψ logo centered
      it.image(40, 40, id(psi_logo));
      // title below image
      it.printf(160, 300, id(font_title), Color(0xF5, 0x9E, 0x0B), TextAlign::CENTER,
                "jc3248-oracle");
      it.printf(160, 350, id(font_body), Color(0xE8, 0xDC, 0xC0), TextAlign::CENTER,
                "one board, many faces");
      // WiFi status
      if (wifi::global_wifi_component->is_connected()) {
        it.printf(160, 420, id(font_small), Color(0x39, 0xD3, 0x53), TextAlign::CENTER,
                  "WiFi: %s", wifi::global_wifi_component->wifi_ssid().c_str());
      } else {
        it.printf(160, 420, id(font_small), Color(0xF5, 0x9E, 0x0B), TextAlign::CENTER,
                  "Setup: improv-wifi.com");
      }

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 32
  - file: "gfonts://Roboto"
    id: font_body
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 16
